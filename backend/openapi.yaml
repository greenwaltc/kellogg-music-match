openapi: 3.0.3
info:
  title: Kellogg Music Match API
  description: |
    REST API for the Kellogg Music Match application that enables users to register, authenticate, 
    and find music taste matches based on favorite artists.
    
    ## Features
    - User registration with password validation
    - Secure authentication with bcrypt password hashing
    - Artist preference management
    - Music taste matching algorithm with overlap scoring
    - In-memory data storage (suitable for prototyping)
  version: 1.0.0
  contact:
    name: Kellogg Music Match Team
    url: https://github.com/greenwaltc/kellogg-music-match
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.kellogg-music-match.com
    description: Production server

tags:
  - name: Authentication
    description: User registration and login operations
  - name: Matching
    description: Music taste matching and artist management
  - name: Feedback
    description: User feedback and suggestions
  - name: Health
    description: Service health and monitoring

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the current status and timestamp of the service
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                    description: Service status indicator
                  time:
                    type: string
                    format: date-time
                    example: "2025-09-13T04:32:51Z"
                    description: Current server timestamp in ISO 8601 format
                required:
                  - status
                  - time

  /artists/search:
    get:
      tags:
        - Matching
      summary: Search for artists with fuzzy matching
      description: |
        Search for musical artists in the database using fuzzy matching. 
        Returns artists that match the search query, ordered by relevance.
        Supports case-insensitive partial matching.
      operationId: searchArtists
      parameters:
        - name: q
          in: query
          required: true
          description: Search query for artist names (1-240 characters)
          schema:
            type: string
            minLength: 1
            maxLength: 240
            example: "taylor"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
            example: 10
      responses:
        '200':
          description: List of matching artists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Artist'
              examples:
                searchResults:
                  summary: Search results for "taylor"
                  value:
                    - id: 1
                      name: "Taylor Swift"
                      created_at: "2024-01-15T10:30:00Z"
                    - id: 42
                      name: "James Taylor"
                      created_at: "2024-02-20T14:45:00Z"
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyQuery:
                  summary: Empty search query
                  value:
                    message: "search query is required"
                tooLong:
                  summary: Query too long
                  value:
                    message: "search query must be 240 characters or less"

  /feedback:
    post:
      tags:
        - Feedback
      summary: Submit user feedback
      description: |
        Allows authenticated users to submit feedback and suggestions about the application.
        Feedback is limited to 1000 characters and requires user authentication.
      operationId: submitFeedback
      parameters:
        - name: X-User-Username
          in: header
          required: true
          description: Username of the authenticated user submitting feedback
          schema:
            type: string
            example: "student123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
            examples:
              validFeedback:
                summary: Valid feedback submission
                value:
                  feedback: "I love the music matching feature! It would be great to have a mobile app version as well."
      responses:
        '201':
          description: Feedback successfully submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
              examples:
                success:
                  summary: Successful submission
                  value:
                    id: 1
                    message: "Feedback submitted successfully"
                    created_at: "2025-09-18T17:45:00Z"
        '400':
          description: Invalid feedback data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyFeedback:
                  summary: Empty feedback text
                  value:
                    message: "feedback text is required"
                tooLong:
                  summary: Feedback too long
                  value:
                    message: "feedback must be 1000 characters or less"
        '401':
          description: User not authenticated or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingUser:
                  summary: Missing username header
                  value:
                    message: "username header is required"
                userNotFound:
                  summary: User not found
                  value:
                    message: "user not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  summary: Database error
                  value:
                    message: "failed to save feedback"

  /register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: |
        Creates a new user account with secure password hashing. All fields are required.
        Username and email must be unique across all users.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              validUser:
                summary: Valid user registration
                value:
                  username: "student123"
                  email: "student@kellogg.northwestern.edu"
                  firstName: "Jane"
                  lastName: "Doe"
                  password: "SecurePass123!"
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    message: "username, email, firstName, lastName, and password are required"
                invalidEmail:
                  summary: Invalid email format
                  value:
                    message: "invalid email format"
                shortPassword:
                  summary: Password too short
                  value:
                    message: "password must be at least 6 characters"
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                usernameExists:
                  summary: Username already taken
                  value:
                    message: "username already exists"
                emailExists:
                  summary: Email already registered
                  value:
                    message: "email already exists"

  /login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: |
        Authenticates a user with username and password. Returns user information 
        including any previously saved artist preferences.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              validLogin:
                summary: Valid login credentials
                value:
                  username: "student123"
                  password: "SecurePass123!"
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingCredentials:
                  summary: Missing username or password
                  value:
                    message: "username and password are required"
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  summary: Invalid username or password
                  value:
                    message: "invalid username or password"

  /findMusicMatches:
    post:
      tags:
        - Matching
      summary: Find music taste matches
      description: |
        Finds users with similar music taste based on artist overlap. Returns up to 5 best matches
        ranked by a combination of overlap count and Jaccard similarity score.
        
        ## Scoring Algorithm
        - **Overlap**: Number of shared artists between users
        - **Jaccard Similarity**: Intersection over union of artist sets
        - **Final Score**: 70% overlap weight + 30% Jaccard weight
        
        Results are sorted by score (desc), then overlap (desc), then name (asc).
      operationId: findMusicMatches
      parameters:
        - name: X-User-Username
          in: header
          required: false
          description: |
            Optional username to associate the submitted artists with a registered user.
            If provided, the user's artist preferences will be updated with the submitted list.
          schema:
            type: string
          example: "student123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistsRequest'
            examples:
              typicalRequest:
                summary: Typical artist list
                value:
                  artists: ["Taylor Swift", "The Beatles", "Radiohead", "Beyoncé"]
              singleArtist:
                summary: Single artist
                value:
                  artists: ["Ed Sheeran"]
      responses:
        '200':
          description: Matches found successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MatchUser'
                maxItems: 5
                description: Up to 5 best matching users, sorted by score
              examples:
                withMatches:
                  summary: Found matching users
                  value:
                    - name: "Alice Johnson"
                      overlap: 3
                      score: 0.812
                    - name: "Bob Smith" 
                      overlap: 2
                      score: 0.667
                    - name: "Carol Davis"
                      overlap: 1
                      score: 0.445
                noMatches:
                  summary: No matches found
                  value: []
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noArtists:
                  summary: No artists provided
                  value:
                    message: "artists required"
                invalidArtists:
                  summary: No valid artists after cleanup
                  value:
                    message: "no valid artists provided"

components:
  schemas:
    User:
      type: object
      description: User profile information
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier (UUID)
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        username:
          type: string
          description: Unique username for authentication
          minLength: 1
          example: "student123"
        email:
          type: string
          format: email
          description: User's email address (unique)
          example: "student@kellogg.northwestern.edu"
        firstName:
          type: string
          description: User's first name
          minLength: 1
          example: "Jane"
        lastName:
          type: string
          description: User's last name
          minLength: 1
          example: "Doe"
        program:
          type: string
          description: MBA program type
          enum: ["2Y", "1Y", "MMM", "MBAi", "JD-MBA", "MD-MBA", "EWMBA"]
          example: "2Y"
        graduationYear:
          type: integer
          description: Expected graduation year
          minimum: 2025
          maximum: 2030
          example: 2027
        artists:
          type: array
          items:
            type: string
          description: List of user's favorite artists (can be empty)
          example: ["Taylor Swift", "The Beatles", "Radiohead"]
      required:
        - id
        - username
        - email
        - firstName
        - lastName
        - program
        - graduationYear
        - artists

    Artist:
      type: object
      description: Musical artist information
      properties:
        id:
          type: integer
          description: Unique artist identifier
          example: 1
        name:
          type: string
          description: Artist name (maximum 240 characters)
          maxLength: 240
          example: "Taylor Swift"
        created_at:
          type: string
          format: date-time
          description: When the artist was added to the database
          example: "2024-01-15T10:30:00Z"
      required:
        - id
        - name
        - created_at

    RegisterRequest:
      type: object
      description: User registration data
      properties:
        username:
          type: string
          description: Desired username (must be unique)
          minLength: 1
          example: "student123"
        email:
          type: string
          format: email
          description: Email address (must be unique and valid)
          example: "student@kellogg.northwestern.edu"
        firstName:
          type: string
          description: User's first name
          minLength: 1
          example: "Jane"
        lastName:
          type: string
          description: User's last name
          minLength: 1
          example: "Doe"
        password:
          type: string
          description: Password (minimum 6 characters, recommend 8+ with complexity)
          minLength: 6
          format: password
          example: "SecurePass123!"
        program:
          type: string
          description: MBA program type
          enum: ["2Y", "1Y", "MMM", "MBAi", "JD-MBA", "MD-MBA", "EWMBA"]
          example: "2Y"
        graduationYear:
          type: integer
          description: Expected graduation year
          minimum: 2025
          maximum: 2030
          example: 2027
      required:
        - username
        - email
        - firstName
        - lastName
        - password
        - program
        - graduationYear

    LoginRequest:
      type: object
      description: User authentication credentials
      properties:
        username:
          type: string
          description: Username for authentication
          minLength: 1
          example: "student123"
        password:
          type: string
          description: User password
          minLength: 1
          format: password
          example: "SecurePass123!"
      required:
        - username
        - password

    AuthResponse:
      type: object
      description: Authentication response containing user information
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: Authentication token (currently unused, reserved for JWT implementation)
          nullable: true
          example: null
      required:
        - user

    ArtistsRequest:
      type: object
      description: Request to find music matches based on artist preferences
      properties:
        artists:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 240
          description: |
            List of favorite artists (maximum 240 characters each). Duplicates are not allowed and will be automatically rejected (case-insensitive comparison).
            Empty strings are automatically removed. Artist names are case-insensitive for matching purposes.
          minItems: 1
          example: ["Taylor Swift", "The Beatles", "Radiohead", "Beyoncé"]
      required:
        - artists

    MatchUser:
      type: object
      description: A user with similar music taste
      properties:
        name:
          type: string
          description: Full name of the matching user (firstName + lastName)
          example: "Alice Johnson"
        program:
          type: string
          description: MBA program type
          enum: ["2Y", "1Y", "MMM", "MBAi", "JD-MBA", "MD-MBA", "EWMBA"]
          example: "2Y"
        graduationYear:
          type: integer
          description: Expected graduation year
          minimum: 2025
          maximum: 2030
          example: 2027
        overlap:
          type: integer
          description: Number of shared artists between the query and this user
          minimum: 1
          example: 3
        score:
          type: number
          format: float
          description: |
            Similarity score calculated from overlap count and Jaccard similarity.
            Range is typically 0.0 to 1.0, with higher values indicating better matches.
          minimum: 0
          maximum: 1
          example: 0.812
        artists:
          type: array
          description: List of favorite artists for this matched user
          items:
            type: string
          example: ["The Beatles", "Radiohead", "Led Zeppelin"]
      required:
        - name
        - program
        - graduationYear
        - overlap
        - score
        - artists

    ErrorResponse:
      type: object
      description: Standard error response format
      properties:
        message:
          type: string
          description: Human-readable error description
          example: "username already exists"
      required:
        - message
        - created_at

    FeedbackRequest:
      type: object
      description: Request to submit user feedback
      properties:
        feedback:
          type: string
          description: User feedback text (maximum 1000 characters)
          minLength: 1
          maxLength: 1000
          example: "I love the music matching feature! It would be great to have a mobile app version as well."
      required:
        - feedback

    FeedbackResponse:
      type: object
      description: Response after successful feedback submission
      properties:
        id:
          type: integer
          description: Unique identifier for the feedback entry
          example: 1
        message:
          type: string
          description: Success message
          example: "Feedback submitted successfully"
        created_at:
          type: string
          format: date-time
          description: When the feedback was submitted
          example: "2025-09-18T17:45:00Z"
      required:
        - id
        - message
        - created_at

  securitySchemes:
    # Reserved for future JWT implementation
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token authentication (not currently implemented)

# Global security (currently none, but reserved for future JWT)
security: []

externalDocs:
  description: Project Repository
  url: https://github.com/greenwaltc/kellogg-music-match