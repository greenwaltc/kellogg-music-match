openapi: 3.0.3
info:
  title: Kellogg Music Match API
  description: |
    REST API for the Kellogg Music Match application that enables users to register, authenticate, 
    and find music taste matches based on favorite artists.
    
    ## Features
    - User registration with password validation
    - Secure authentication with bcrypt password hashing
    - Artist preference management
    - Music taste matching algorithm with overlap scoring
    - In-memory data storage (suitable for prototyping)
  version: 1.0.0
  contact:
    name: Kellogg Music Match Team
    url: https://github.com/greenwaltc/kellogg-music-match
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.kellogg-music-match.com
    description: Production server

tags:
  - name: Authentication
    description: User registration and login operations
  - name: Matching
    description: Music taste matching and artist management
  - name: Concerts
    description: Concert and event discovery operations
  - name: Feedback
    description: User feedback and suggestions
  - name: Health
    description: Service health and monitoring

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the current status and timestamp of the service
      operationId: getHealth
      security: []  # Override global security - no authentication required
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                    description: Service status indicator
                  time:
                    type: string
                    format: date-time
                    example: "2025-09-13T04:32:51Z"
                    description: Current server timestamp in ISO 8601 format
                required:
                  - status
                  - time
  /concerts/{eventId}/interest:
    post:
      tags:
        - Concerts
      summary: Set or update the authenticated user's interest for an event
      operationId: setEventInterest
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
          description: Concert event ID
        - name: X-User-Username
          in: header
          required: true
          schema:
            type: string
          deprecated: true
          description: LEGACY user identifier header (deprecated; JWT claims now authoritative and this header will be removed).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interestType:
                  $ref: '#/components/schemas/EventInterestType'
              required:
                - interestType
      responses:
        '204':
          description: Interest set successfully
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Concerts
      summary: Remove the authenticated user's interest for an event
      operationId: removeEventInterest
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: X-User-Username
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Interest removed
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /artists/search:
    get:
      tags:
        - Matching
      summary: Search for artists with fuzzy matching
      description: |
        Search for musical artists in the database using fuzzy matching. 
        Returns artists that match the search query, ordered by relevance.
        Supports case-insensitive partial matching.
      operationId: searchArtists
      parameters:
        - name: q
          in: query
          required: true
          description: Search query for artist names (1-240 characters)
          schema:
            type: string
            minLength: 1
            maxLength: 240
            example: "taylor"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
            example: 10
      responses:
        '200':
          description: List of matching artists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Artist'
              examples:
                searchResults:
                  summary: Search results for "taylor"
                  value:
                    - id: 1
                      name: "Taylor Swift"
                      created_at: "2024-01-15T10:30:00Z"
                    - id: 42
                      name: "James Taylor"
                      created_at: "2024-02-20T14:45:00Z"
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyQuery:
                  summary: Empty search query
                  value:
                    message: "search query is required"
                tooLong:
                  summary: Query too long
                  value:
                    message: "search query must be 240 characters or less"

  /feedback:
    post:
      tags:
        - Feedback
      summary: Submit user feedback
      description: |
        Allows authenticated users to submit feedback and suggestions about the application.
        Feedback is limited to 1000 characters and requires user authentication.
      operationId: submitFeedback
      parameters:
        - name: X-User-Username
          in: header
          required: true
          schema:
            type: string
            example: "student123"
          deprecated: true
          description: LEGACY user identifier header (deprecated; JWT claims now authoritative and this header will be removed).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
            examples:
              validFeedback:
                summary: Valid feedback submission
                value:
                  feedback: "I love the music matching feature! It would be great to have a mobile app version as well."
      responses:
        '201':
          description: Feedback successfully submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
              examples:
                success:
                  summary: Successful submission
                  value:
                    id: 1
                    message: "Feedback submitted successfully"
                    created_at: "2025-09-18T17:45:00Z"
        '400':
          description: Invalid feedback data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyFeedback:
                  summary: Empty feedback text
                  value:
                    message: "feedback text is required"
                tooLong:
                  summary: Feedback too long
                  value:
                    message: "feedback must be 1000 characters or less"
        '401':
          description: User not authenticated or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingUser:
                  summary: Missing username header
                  value:
                    message: "username header is required"
                userNotFound:
                  summary: User not found
                  value:
                    message: "user not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  summary: Database error
                  value:
                    message: "failed to save feedback"

  /register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: |
        Creates a new user account with secure password hashing. All fields are required.
        Username and email must be unique across all users.
      operationId: registerUser
      security: []  # Override global security - no authentication required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              validUser:
                summary: Valid user registration
                value:
                  username: "student123"
                  email: "student@kellogg.northwestern.edu"
                  firstName: "Jane"
                  lastName: "Doe"
                  password: "SecurePass123!"
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    message: "username, email, firstName, lastName, and password are required"
                invalidEmail:
                  summary: Invalid email format
                  value:
                    message: "invalid email format"
                shortPassword:
                  summary: Password too short
                  value:
                    message: "password must be at least 6 characters"
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                usernameExists:
                  summary: Username already taken
                  value:
                    message: "username already exists"
                emailExists:
                  summary: Email already registered
                  value:
                    message: "email already exists"

  /login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: |
        Authenticates a user with username and password. Returns user information 
        including any previously saved artist preferences.
      operationId: loginUser
      security: []  # Override global security - no authentication required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              validLogin:
                summary: Valid login credentials
                value:
                  username: "student123"
                  password: "SecurePass123!"
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingCredentials:
                  summary: Missing username or password
                  value:
                    message: "username and password are required"
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  summary: Invalid username or password
                  value:
                    message: "invalid username or password"

  /forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: |
        Initiates a password reset process by sending a reset token to the user's email address.
        The token expires in 1 hour for security.
      operationId: forgotPassword
      security: []  # Override global security - no authentication required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            examples:
              validEmail:
                summary: Valid email address
                value:
                  email: "student@kellogg.northwestern.edu"
      responses:
        '200':
          description: Password reset email sent (always returns success for security)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  summary: Reset email sent
                  value:
                    message: "If an account with that email exists, a password reset link has been sent"
        '400':
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingEmail:
                  summary: Missing email
                  value:
                    message: "email is required"
                invalidEmail:
                  summary: Invalid email format
                  value:
                    message: "invalid email format"

  /reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password with token
      description: |
        Resets a user's password using a valid reset token received via email.
        The token can only be used once and expires in 1 hour.
      operationId: resetPassword
      security: []  # Override global security - no authentication required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            examples:
              validReset:
                summary: Valid password reset
                value:
                  token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  newPassword: "NewSecurePass123!"
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  summary: Password reset successful
                  value:
                    message: "Password has been reset successfully"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    message: "token and newPassword are required"
                invalidToken:
                  summary: Invalid or expired token
                  value:
                    message: "invalid or expired reset token"
                weakPassword:
                  summary: Password too weak
                  value:
                    message: "password must be at least 8 characters and contain uppercase, lowercase, and number"

  /findMusicMatches:
    post:
      tags:
        - Matching
      summary: Find music taste matches
      description: |
        Finds users with similar music taste based on artist overlap. Returns up to 5 best matches
        ranked by a combination of overlap count and Jaccard similarity score.
        
        ## Scoring Algorithm
        - **Overlap**: Number of shared artists between users
        - **Jaccard Similarity**: Intersection over union of artist sets
        - **Final Score**: 70% overlap weight + 30% Jaccard weight
        
        Results are sorted by score (desc), then overlap (desc), then name (asc).
      operationId: findMusicMatches
      parameters:
        - name: X-User-Username
          in: header
          required: false
          schema:
            type: string
          example: "student123"
          deprecated: true
          description: LEGACY user identifier header (deprecated; JWT claims now authoritative and this header will be removed).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistsRequest'
            examples:
              typicalRequest:
                summary: Typical artist list
                value:
                  artists: ["Taylor Swift", "The Beatles", "Radiohead", "Beyoncé"]
              singleArtist:
                summary: Single artist
                value:
                  artists: ["Ed Sheeran"]
      responses:
        '200':
          description: Matches found successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MatchUser'
                maxItems: 5
                description: Up to 5 best matching users, sorted by score
              examples:
                withMatches:
                  summary: Found matching users
                  value:
                    - name: "Alice Johnson"
                      overlap: 3
                      score: 0.812
                    - name: "Bob Smith" 
                      overlap: 2
                      score: 0.667
                    - name: "Carol Davis"
                      overlap: 1
                      score: 0.445
                noMatches:
                  summary: No matches found
                  value: []
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tooFewArtists:
                  summary: Less than 5 artists provided
                  value:
                    message: "at least 5 artists are required"
                tooManyArtists:
                  summary: More than 20 artists provided
                  value:
                    message: "maximum of 20 artists allowed"
                invalidArtists:
                  summary: No valid artists after cleanup
                  value:
                    message: "at least 5 valid artists are required"

  /concerts/search:
    get:
      tags:
        - Concerts
      summary: Search for upcoming concerts
      description: Search for upcoming concerts based on criteria like artist, location, or genre
      operationId: searchConcerts
      parameters:
        - name: artist
          in: query
          description: Search for concerts by artist name
          required: false
          schema:
            type: string
            maxLength: 100
            example: "Taylor Swift"
        - name: city
          in: query
          description: City to search for concerts in
          required: false
          schema:
            type: string
            maxLength: 50
            example: "Chicago"
        - name: state
          in: query
          description: State or province code
          required: false
          schema:
            type: string
            maxLength: 10
            example: "IL"
        - name: country
          in: query
          description: Country code (default US)
          required: false
          schema:
            type: string
            maxLength: 5
            example: "US"
        - name: genre
          in: query
          description: Music genre filter
          required: false
          schema:
            type: string
            maxLength: 50
            example: "Rock"
        - name: start_date
          in: query
          description: Start date for concert search (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
            example: "2024-01-01"
        - name: end_date
          in: query
          description: End date for concert search (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
            example: "2024-12-31"
        - name: page
          in: query
          description: Page number for pagination (0-based)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
        - name: size
          in: query
          description: Number of results per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
            example: 20
      responses:
        '200':
          description: Concert search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcertSearchResult'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /concerts/{eventId}:
    get:
      tags:
        - Concerts
      summary: Get concert details by ID
      description: Retrieve detailed information about a specific concert event
      operationId: getConcertById
      parameters:
        - name: eventId
          in: path
          description: Unique identifier for the concert event
          required: true
          schema:
            type: string
            example: "G5vYZ9AJWlhKo"
      responses:
        '200':
          description: Concert details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Concert'
        '404':
          description: Concert not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chicago/events:
    get:
      tags:
        - Concerts
      summary: Get Chicago area events with search and pagination
      description: |
        Retrieve upcoming concert events in the Chicago area with optional artist name filtering.
        Results are sorted chronologically (soonest first) and support efficient pagination.
        You can also filter to only events that currently have at least one user interest recorded.
      operationId: getChicagoEvents
      parameters:
        - name: artistName
          in: query
          description: Filter events by artist name (case-insensitive partial match)
          required: false
          schema:
            type: string
            maxLength: 100
            example: "Taylor"
        - name: limit
          in: query
          description: Maximum number of events to return per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
        - name: offset
          in: query
          description: Number of events to skip (for pagination)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
        - name: anyInterest
          in: query
          description: If true, only return events that have at least one user expressing any interest (INTERESTED, GOING, or LOOKING_FOR_GROUP)
          required: false
          schema:
            type: boolean
            default: false
            example: false
        - name: sortByRelevancy
          in: query
          description: If true, sort events by relevancy to users' favorite artists when artistName is provided. Otherwise, sort by event date (soonest first).
          required: false
          schema:
            type: boolean
            default: true
            example: false
      responses:
        '200':
          description: Chicago events retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChicagoEventsResult'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chicago/events/{eventId}:
    get:
      tags:
        - Concerts
      summary: Get a single Chicago event by ID (with interest enrichment)
      description: Retrieve a single Chicago event from the local database including aggregated interest user name buckets.
      operationId: getChicagoEventById
      parameters:
        - name: eventId
          in: path
          required: true
          description: Event identifier
          schema:
            type: string
      responses:
        '200':
          description: Event retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Concert'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    User:
      type: object
      description: User profile information
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier (UUID)
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        username:
          type: string
          description: Unique username for authentication
          minLength: 1
          example: "student123"
        email:
          type: string
          format: email
          description: User's email address (unique)
          example: "student@kellogg.northwestern.edu"
        firstName:
          type: string
          description: User's first name
          minLength: 1
          example: "Jane"
        lastName:
          type: string
          description: User's last name
          minLength: 1
          example: "Doe"
        program:
          type: string
          description: MBA program type
          enum: ["2Y", "1Y", "MMM", "MBAi", "JD-MBA", "MD-MBA", "EWMBA", "JV"]
          example: "2Y"
        graduationYear:
          type: integer
          description: Expected graduation year
          minimum: 2025
          maximum: 2030
          example: 2027
        artists:
          type: array
          items:
            type: string
          description: List of user's favorite artists (can be empty)
          example: ["Taylor Swift", "The Beatles", "Radiohead"]
      required:
        - id
        - username
        - email
        - firstName
        - lastName
        - program
        - graduationYear
        - artists

    Artist:
      type: object
      description: Musical artist information
      properties:
        id:
          type: integer
          description: Unique artist identifier
          example: 1
        name:
          type: string
          description: Artist name (maximum 240 characters)
          maxLength: 240
          example: "Taylor Swift"
        created_at:
          type: string
          format: date-time
          description: When the artist was added to the database
          example: "2024-01-15T10:30:00Z"
      required:
        - id
        - name
        - created_at

    RegisterRequest:
      type: object
      description: User registration data
      properties:
        username:
          type: string
          description: Desired username (must be unique)
          minLength: 1
          example: "student123"
        email:
          type: string
          format: email
          description: Email address (must be unique and valid)
          example: "student@kellogg.northwestern.edu"
        firstName:
          type: string
          description: User's first name
          minLength: 1
          example: "Jane"
        lastName:
          type: string
          description: User's last name
          minLength: 1
          example: "Doe"
        password:
          type: string
          description: Password (minimum 6 characters, recommend 8+ with complexity)
          minLength: 6
          format: password
          example: "SecurePass123!"
        program:
          type: string
          description: MBA program type
          enum: ["2Y", "1Y", "MMM", "MBAi", "JD-MBA", "MD-MBA", "EWMBA", "JV"]
          example: "2Y"
        graduationYear:
          type: integer
          description: Expected graduation year
          minimum: 2025
          maximum: 2030
          example: 2027
      required:
        - username
        - email
        - firstName
        - lastName
        - password
        - program
        - graduationYear

    LoginRequest:
      type: object
      description: User authentication credentials
      properties:
        username:
          type: string
          description: Username for authentication
          minLength: 1
          example: "student123"
        password:
          type: string
          description: User password
          minLength: 1
          format: password
          example: "SecurePass123!"
      required:
        - username
        - password

    AuthResponse:
      type: object
      description: Authentication response containing user information
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: Authentication token (currently unused, reserved for JWT implementation)
          nullable: true
          example: null
      required:
        - user

    ArtistsRequest:
      type: object
      description: Request to find music matches based on artist preferences
      properties:
        artists:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 240
          description: |
            List of favorite artists (maximum 240 characters each). Duplicates are not allowed and will be automatically rejected (case-insensitive comparison).
            Empty strings are automatically removed. Artist names are case-insensitive for matching purposes.
          minItems: 5
          maxItems: 20
          example: ["Taylor Swift", "The Beatles", "Radiohead", "Beyoncé", "Daft Punk"]
      required:
        - artists

    MatchUser:
      type: object
      description: A user with similar music taste
      properties:
        name:
          type: string
          description: Full name of the matching user (firstName + lastName)
          example: "Alice Johnson"
        program:
          type: string
          description: MBA program type
          enum: ["2Y", "1Y", "MMM", "MBAi", "JD-MBA", "MD-MBA", "EWMBA", "JV"]
          example: "2Y"
        graduationYear:
          type: integer
          description: Expected graduation year
          minimum: 2025
          maximum: 2030
          example: 2027
        overlap:
          type: integer
          description: Number of shared artists between the query and this user
          minimum: 1
          example: 3
        score:
          type: number
          format: float
          description: |
            Similarity score calculated from overlap count and Jaccard similarity.
            Range is typically 0.0 to 1.0, with higher values indicating better matches.
          minimum: 0
          maximum: 1
          example: 0.812
        artists:
          type: array
          description: List of favorite artists for this matched user
          items:
            type: string
          example: ["The Beatles", "Radiohead", "Led Zeppelin"]
      required:
        - name
        - program
        - graduationYear
        - overlap
        - score
        - artists

    ErrorResponse:
      type: object
      description: Standard error response format
      properties:
        message:
          type: string
          description: Human-readable error description
          example: "username already exists"
      required:
        - message
        - created_at

    FeedbackRequest:
      type: object
      description: Request to submit user feedback
      properties:
        feedback:
          type: string
          description: User feedback text (maximum 1000 characters)
          minLength: 1
          maxLength: 1000
          example: "I love the music matching feature! It would be great to have a mobile app version as well."
      required:
        - feedback

    FeedbackResponse:
      type: object
      description: Response after successful feedback submission
      properties:
        id:
          type: integer
          description: Unique identifier for the feedback entry
          example: 1
        message:
          type: string
          description: Success message
          example: "Feedback submitted successfully"
        created_at:
          type: string
          format: date-time
          description: When the feedback was submitted
          example: "2025-09-18T17:45:00Z"
      required:
        - id
        - message
        - created_at

    Concert:
      type: object
      description: A concert or music event
      properties:
        id:
          type: string
          description: Unique identifier for the concert
          example: "G5vYZ9AJWlhKo"
        name:
          type: string
          description: Name of the concert/event
          example: "Taylor Swift | The Eras Tour"
        date:
          type: string
          format: date-time
          description: Date and time of the concert
          example: "2024-06-15T19:30:00Z"
        venue:
          $ref: '#/components/schemas/Venue'
        artists:
          type: array
          items:
            $ref: '#/components/schemas/ConcertArtist'
          description: List of performing artists
        genres:
          type: array
          items:
            type: string
          description: Music genres associated with this event
          example: ["Pop", "Country"]
        priceRange:
          $ref: '#/components/schemas/PriceRange'
        ticketUrl:
          type: string
          format: uri
          description: URL to purchase tickets
          example: "https://www.ticketmaster.com/event/123"
        interestedUserIds:
          deprecated: true
          type: array
          description: (Deprecated) User IDs with INTERESTED status – replaced by interestedUsers
          items:
            type: string
        interestedUsers:
          type: array
          description: Full names (First Last) of users with INTERESTED status
          items:
            type: string
          example: ["Alice Johnson"]
        goingUserIds:
          deprecated: true
          type: array
          description: (Deprecated) User IDs with GOING status – replaced by goingUsers
          items:
            type: string
        goingUsers:
          type: array
          description: Full names (First Last) of users with GOING status
          items:
            type: string
          example: ["Bob Smith"]
        lookingForGroupUserIds:
          deprecated: true
          type: array
          description: (Deprecated) User IDs with LOOKING_FOR_GROUP status – replaced by lookingForGroupUsers
          items:
            type: string
        lookingForGroupUsers:
          type: array
          description: Full names (First Last) of users with LOOKING_FOR_GROUP status
          items:
            type: string
          example: ["Carol Davis"]
        myInterest:
          type: string
          nullable: true
          description: The authenticated user's current interest status for this event (one of INTERESTED, GOING, LOOKING_FOR_GROUP) or null if none.
      required:
        - id
        - name
        - date
        - venue
        - artists

    ConcertSearchResult:
      type: object
      description: Search result containing concerts and pagination info
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Concert'
          description: List of concert events
        totalCount:
          type: integer
          description: Total number of events matching the search
          example: 150
        currentPage:
          type: integer
          description: Current page number (0-based)
          example: 0
        totalPages:
          type: integer
          description: Total number of pages
          example: 8
        hasMore:
          type: boolean
          description: Whether there are more results available
          example: true
      required:
        - events
        - totalCount
        - currentPage
        - totalPages
        - hasMore

    ChicagoEventsResult:
      type: object
      description: Result set for Chicago area events with pagination support
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Concert'
          description: List of Chicago area concert events, sorted chronologically
        hasMore:
          type: boolean
          description: Whether there are more events available for pagination
          example: true
        totalCount:
          type: integer
          description: Total number of events matching the search criteria
          example: 42
      required:
        - events
        - hasMore
        - totalCount

    Venue:
      type: object
      description: Concert venue information
      properties:
        name:
          type: string
          description: Name of the venue
          example: "United Center"
        address:
          $ref: '#/components/schemas/Address'
      required:
        - name

    Address:
      type: object
      description: Physical address
      properties:
        street:
          type: string
          description: Street address
          example: "1901 W Madison St"
        city:
          type: string
          description: City name
          example: "Chicago"
        state:
          type: string
          description: State or province
          example: "IL"
        country:
          type: string
          description: Country code
          example: "US"
        postalCode:
          type: string
          description: Postal/ZIP code
          example: "60612"

    ConcertArtist:
      type: object
      description: Artist performing at a concert
      properties:
        name:
          type: string
          description: Artist name
          example: "Taylor Swift"
        genres:
          type: array
          items:
            type: string
          description: Artist genres
          example: ["Pop", "Country"]
      required:
        - name

    PriceRange:
      type: object
      description: Price range for tickets
      properties:
        min:
          type: number
          format: float
          description: Minimum ticket price
          example: 49.99
        max:
          type: number
          format: float
          description: Maximum ticket price
          example: 299.99
        currency:
          type: string
          description: Currency code
          example: "USD"
      required:
        - min
        - max
        - currency

    ForgotPasswordRequest:
      type: object
      description: Request to initiate password reset
      properties:
        email:
          type: string
          format: email
          description: Email address of the user requesting password reset
          example: "student@kellogg.northwestern.edu"
      required:
        - email

    ResetPasswordRequest:
      type: object
      description: Request to reset password with token
      properties:
        token:
          type: string
          description: Password reset token received via email
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        newPassword:
          type: string
          format: password
          description: New password (minimum 8 characters, must contain uppercase, lowercase, and number)
          minLength: 8
          example: "NewSecurePass123!"
      required:
        - token
        - newPassword

    MessageResponse:
      type: object
      description: Generic message response
      properties:
        message:
          type: string
          description: Response message
          example: "Operation completed successfully"
      required:
        - message

    EventInterestType:
      type: string
      description: Enum of possible user interest statuses for an event
      enum: [INTERESTED, GOING, LOOKING_FOR_GROUP]
      example: INTERESTED

  securitySchemes:
    # JWT implementation now active
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token authentication for secure API access

# Global security - all endpoints except auth require JWT
security:
  - BearerAuth: []

externalDocs:
  description: Project Repository
  url: https://github.com/greenwaltc/kellogg-music-match