version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/schema/migrations"
    gen:
      go:
        package: "database"
        out: "db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: uuid
            go_type: "github.com/google/uuid.UUID"