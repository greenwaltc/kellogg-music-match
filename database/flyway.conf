# Flyway Configuration
# This configuration file defines how Flyway connects to and manages the database

# Database connection URL (can be overridden by environment variable FLYWAY_URL)
flyway.url=jdbc:postgresql://postgres:5432/kellogg_music_match

# Database credentials (can be overridden by environment variables)
flyway.user=kellogg_user
flyway.password=kellogg_secure_pass_2024

# Locations where Flyway will look for migration files
flyway.locations=filesystem:/flyway/sql

# Schemas managed by Flyway (default schema for PostgreSQL is 'public')
flyway.schemas=public

# Validation settings
flyway.validateOnMigrate=true
flyway.cleanDisabled=true

# Placeholders (can be used in SQL files as ${placeholder})
flyway.placeholders.database_name=kellogg_music_match
flyway.placeholders.app_user=kellogg_user