services:
  # PostgreSQL Database - no initialization scripts, Flyway will handle schema
  postgres:
    build:
      context: .
      dockerfile: postgres.dockerfile
    container_name: kmm-postgres
    environment:
      POSTGRES_USER: kellogg_user
      POSTGRES_PASSWORD: kellogg_secure_pass_2024
      POSTGRES_DB: kellogg_music_match
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Persistent data storage only, no initialization scripts
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kellogg_user -d kellogg_music_match"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Flyway migration service
  flyway:
    image: flyway/flyway:10-alpine
    container_name: kmm-flyway
    command: migrate
    volumes:
      - ./backend/db/schema/migrations:/flyway/sql:ro
      - ./database/flyway.conf:/flyway/conf/flyway.conf:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/kellogg_music_match
      FLYWAY_USER: kellogg_user
      FLYWAY_PASSWORD: kellogg_secure_pass_2024
      FLYWAY_SCHEMAS: public
      FLYWAY_BASELINE_ON_MIGRATE: 'true'
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"  # Only run once to migrate

  # MusicBrainz data loader service
  musicbrainz-loader:
    build:
      context: .
      dockerfile: Dockerfile.musicbrainz
    container_name: kmm-musicbrainz-loader
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: kellogg_music_match
      PGUSER: kellogg_user
      PGPASSWORD: kellogg_secure_pass_2024
    volumes:
      - ./scripts:/scripts:ro
      - ./musicbrainz_artists_50k_deduplicated.csv:/data/musicbrainz_artists.csv:ro
    command: >
      bash -c "
        echo 'Waiting for database migrations to complete...' &&
        sleep 10 &&
        echo 'Loading MusicBrainz artists data (deduplicated)...' &&
        python3 /scripts/load_musicbrainz_artists.py /data/musicbrainz_artists.csv --connection-string postgresql://kellogg_user:kellogg_secure_pass_2024@postgres:5432/kellogg_music_match &&
        echo 'MusicBrainz data loading completed successfully!'
      "
    depends_on:
      flyway:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: "no"  # Only run once to load data

  backend:
    build: ./backend
    image: kellogg-music-match-backend:latest
    container_name: kmm-backend
    environment:
      # Database connection environment variables
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kellogg_music_match
      DB_USER: kellogg_user
      DB_PASSWORD: kellogg_secure_pass_2024
      DB_SSLMODE: disable
      DEBUG_ENABLED: "true"
      # Ticketmaster API configuration
      TICKETMASTER_CONSUMER_KEY: 3RVuRqbo6iLpQj0iEG6UUAZiWa2Z5Y0O
      TICKETMASTER_CONSUMER_SECRET: EzfZFlmQwTHXIrsb
      TICKETMASTER_BASE_URL: https://app.ticketmaster.com/discovery/v2
      TICKETMASTER_TIMEOUT: 30
      TICKETMASTER_MAX_RESULTS: 200
      TICKETMASTER_DEFAULT_CITY: Chicago
      TICKETMASTER_DEFAULT_STATE: IL
      TICKETMASTER_DEFAULT_COUNTRY: US
      EMAIL_ENABLED: "true"
      EMAIL_PROVIDER: sendgrid
      EMAIL_FROM_EMAIL: support@kelloggmatch.com
      EMAIL_FROM_NAME: Kellogg Music Match
      APP_BASE_URL: https://kelloggmatch.com
      SENDGRID_API_KEY: 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
    depends_on:
      flyway:
        condition: service_completed_successfully
      musicbrainz-loader:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  ui:
    build: 
      context: ./ui
      args:
        API_BASE_URL: /api
    image: kellogg-music-match-ui:latest
    container_name: kmm-ui
    environment:
      - NGINX_PORT=80
      - API_BASE_URL=/api
    depends_on:
      - backend
    ports:
      - "4200:80"
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
