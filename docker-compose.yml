services:
  # PostgreSQL Database - no initialization scripts, Flyway will handle schema
  postgres:
    build:
      context: .
      dockerfile: postgres.dockerfile
    container_name: kmm-postgres
    environment:
      POSTGRES_USER: kellogg_user
      POSTGRES_PASSWORD: kellogg_secure_pass_2024
      POSTGRES_DB: kellogg_music_match
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Persistent data storage only, no initialization scripts
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kellogg_user -d kellogg_music_match"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Flyway migration service
  flyway:
    image: flyway/flyway:10-alpine
    container_name: kmm-flyway
    command: migrate
    volumes:
      - ./backend/db/schema/migrations:/flyway/sql:ro
      - ./database/flyway.conf:/flyway/conf/flyway.conf:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/kellogg_music_match
      FLYWAY_USER: kellogg_user
      FLYWAY_PASSWORD: kellogg_secure_pass_2024
      FLYWAY_SCHEMAS: public
      FLYWAY_BASELINE_ON_MIGRATE: 'true'
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"  # Only run once to migrate


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DEBUG: "false"
    image: kellogg-music-match-backend:latest
    container_name: kmm-backend
    environment:
      # Database connection environment variables
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kellogg_music_match
      DB_USER: kellogg_user
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_SSLMODE: disable
      DEBUG_ENABLED: "true"
      # Spotify API credentials (provide via .env; do NOT hardcode secrets)
      # Ensure your .env file contains:
      #   SPOTIFY_CLIENT_ID=your_spotify_app_client_id
      #   SPOTIFY_CLIENT_SECRET=your_spotify_app_client_secret
      # Optionally override redirect; default below matches local UI callback.
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:4200/spotify/callback}
      # Ticketmaster API configuration
      TICKETMASTER_CONSUMER_KEY: ${TICKETMASTER_CONSUMER_KEY:-}
      TICKETMASTER_CONSUMER_SECRET: ${TICKETMASTER_CONSUMER_SECRET:-}
      TICKETMASTER_BASE_URL: https://app.ticketmaster.com/discovery/v2
      TICKETMASTER_TIMEOUT: 30
      TICKETMASTER_MAX_RESULTS: 100
      TICKETMASTER_DEFAULT_CITY: Chicago
      TICKETMASTER_DEFAULT_STATE: IL
      TICKETMASTER_DEFAULT_COUNTRY: US
      TICKETMASTER_DATE_RANGE_MONTHS: 12
      TICKETMASTER_GEO_LATLONG: 41.8781,-87.6298
      TICKETMASTER_RADIUS: 50
      TICKETMASTER_RADIUS_UNIT: miles
      # Inter-page delay for Ticketmaster pagination (milliseconds)
      TICKETMASTER_PAGE_DELAY_MS: 600
      EMAIL_ENABLED: "true"
      EMAIL_PROVIDER: sendgrid
      EMAIL_FROM_EMAIL: support@kelloggmatch.com
      EMAIL_FROM_NAME: Kellogg Music Match
      APP_BASE_URL: https://kelloggmatch.com
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      # Feature flags
      MATCH_TRACKS_ENABLED: "true"
      # Matching configuration: cap ranks considered per user (defaults 20)
      MATCHING_ARTIST_TOPN: 50
      MATCHING_TRACK_TOPN: 50
      # Web Push / VAPID
      PUSH_ENABLED: ${PUSH_ENABLED:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: "${VAPID_SUBJECT:-https://kelloggmatch.com}"
      # Native push notification (APNS/FCM) settings
      NATIVE_PUSH_ENABLED: ${NATIVE_PUSH_ENABLED:-false}
      APNS_ENABLED: ${APNS_ENABLED:-false}
      APNS_ENV: ${APNS_ENV:-development}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_KEY_PEM: ${APNS_KEY_PEM:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      FCM_ENABLED: ${FCM_ENABLED:-false}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      # Prefer reading the service account from a mounted secret file
      FCM_SERVICE_ACCOUNT_PATH: /run/secrets/fcm_sa.json
      # Legacy inline JSON (fallback when PATH not used)
      FCM_SERVICE_ACCOUNT: ${FCM_SERVICE_ACCOUNT:-}
    secrets:
      - source: fcm_sa_json
        target: fcm_sa.json
        mode: 0440
    depends_on:
      flyway:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  ui:
    build: 
      context: ./ui
    image: kellogg-music-match-ui:latest
    container_name: kmm-ui
    environment:
      - NGINX_PORT=80
      - API_BASE_URL=/api
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-}
    depends_on:
      - backend
    ports:
      - "4200:80"
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local

secrets:
  # Configure the path to your local Service Account JSON via env var
  #   export FCM_SERVICE_ACCOUNT_LOCAL_PATH="$HOME/Downloads/your-firebase-sa.json"
  # If not set, it will look in ./secrets/fcm_sa.json
  fcm_sa_json:
    file: ${FCM_SERVICE_ACCOUNT_LOCAL_PATH:-./secrets/fcm_sa.json}
