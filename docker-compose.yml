version: '3.9'
services:
  backend:
    build: ./backend
    image: kellogg-music-match-backend:latest
    container_name: kmm-backend
    ports:
      - "8080:8080"
  ui:
    build: 
      context: ./ui
      args:
        API_BASE_URL: http://localhost:8080
    image: kellogg-music-match-ui:latest
    container_name: kmm-ui
    environment:
      - NGINX_PORT=80
      - API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
    ports:
      - "4200:80"
