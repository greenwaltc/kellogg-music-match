<section class="home-tiles" *ngIf="true">
  <!-- Spotify tile at top if not yet synced -->
  <div class="tile tile-spotify small" *ngIf="!matches.spotifyReady()"
    (click)="connectSpotify()" (keydown.enter)="connectSpotify()" (keydown.space)="$event.preventDefault(); connectSpotify()"
    role="button" tabindex="0" aria-label="Link with Spotify">
    <div class="tile-content">
      <div class="spotify-badge">Spotify</div>
      <div class="tile-title">Link with Spotify</div>
      <div class="tile-sub">Connect to personalize matches and events</div>
    </div>
  </div>

  <!-- Primary tiles -->
  <div class="tile-grid">
    <div class="tile" (click)="gotoMatches()" (keydown.enter)="gotoMatches()" (keydown.space)="$event.preventDefault(); gotoMatches()"
      role="button" tabindex="0" aria-label="Open Matches">
      <div class="tile-content">
        <div class="tile-title">Matches</div>
        <div class="tile-sub">Find students with similar taste</div>
      </div>
    </div>
    <div class="tile" (click)="gotoEvents()" (keydown.enter)="gotoEvents()" (keydown.space)="$event.preventDefault(); gotoEvents()"
      role="button" tabindex="0" aria-label="Open Chicago Events">
      <div class="tile-content">
        <div class="tile-title">Chicago Events</div>
        <div class="tile-sub">Concerts relevant to your artists</div>
      </div>
    </div>
  </div>

  <!-- Re-sync tile at bottom if already synced -->
  <div class="tile tile-spotify small bottom" *ngIf="matches.spotifyReady()"
    (click)="connectSpotify()" (keydown.enter)="connectSpotify()" (keydown.space)="$event.preventDefault(); connectSpotify()"
    role="button" tabindex="0" aria-label="Re-sync Spotify">
    <div class="tile-content">
      <div class="spotify-badge">Spotify</div>
      <div class="tile-title">Re-sync Spotify</div>
      <div class="tile-sub">Refresh your top artists snapshot</div>
    </div>
  </div>
</section>
