<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#667eea" stroke="#4c63d2" stroke-width="2"/>
  
  <!-- Music notes -->
  <g fill="#ffffff">
    <!-- First note -->
    <circle cx="22" cy="38" r="3"/>
    <rect x="24.5" y="20" width="1.5" height="18"/>
    <path d="M24.5 20 Q28 18 32 20 L32 24 Q28 22 26 24 Z"/>
    
    <!-- Second note -->
    <circle cx="38" cy="42" r="3"/>
    <rect x="40.5" y="24" width="1.5" height="18"/>
    <path d="M40.5 24 Q44 22 48 24 L48 28 Q44 26 42 28 Z"/>
    
    <!-- Connection line suggesting harmony -->
    <path d="M26 24 Q32 20 42 28" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Kellogg "K" stylized -->
  <g fill="#ffffff" opacity="0.8">
    <path d="M16 16 L18 16 L18 24 L22 20 L24 20 L20 24 L24 28 L22 28 L18 24 L18 28 L16 28 Z"/>
  </g>
  
  <!-- Musical staff lines (subtle) -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.3">
    <line x1="8" y1="48" x2="56" y2="48"/>
    <line x1="8" y1="52" x2="56" y2="52"/>
    <line x1="8" y1="56" x2="56" y2="56"/>
  </g>
</svg>